@if (!isReplaying()) {
  <div>
    <button
      matButton
      [disabled]="!isReplayable()"
      [class.disabled]="!isReplayable()"
      id="buttonStartReplay"
      title="Start replay"
      (click)="startReplay.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> play_arrow </span>
      Replay
    </button>

    <button
      matButton
      id="buttonImport"
      title="Import story from file"
      onclick="document.getElementById('import').click()"
    >
      <span class="material-icons-outlined buttonIcon"> file_upload </span>
      Import file
    </button>

    <button
      matButton
      id="buttonUrlImport"
      title="Import story from URL"
      (click)="openImportFromUrlDialog.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> cloud_upload </span>
      Import URL
    </button>

    <input
      type="file"
      accept=".dst, .egn, .svg"
      style="display: none"
      id="import"
      onclick="this.value = null"
      (change)="import.emit()"
    />
    <button
      matButton
      [disabled]="!hasDomainStory() && !hasTitle()"
      [class.disabled]="!hasDomainStory() && !hasTitle()"
      [class.dirty]="isDirty()"
      id="export"
      title="Export story as .egn, .svg or .png file"
      (click)="openDownloadDialog.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> file_download </span>
      Export
    </button>
    <button
      matButton
      [disabled]="!hasDomainStory()"
      [class.disabled]="!hasDomainStory()"
      title="Change multiple labels at once"
      (click)="openLabelDictionary.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> spellcheck </span>
      Dictionary
    </button>

    <button
      matButton
      title="Create a new domain story"
      (click)="newStory.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> note_add </span>
      New story
    </button>

    <button
      matButton
      title="Change Icons and Settings"
      (click)="openSettings.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> settings </span>
      Settings
    </button>

    <button
      matButton
      title="Show keyboard shortcuts"
      (click)="showKeyboardShortCuts.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> keyboard </span>
      Shortcuts
    </button>
  </div>
} @else {
  <div class="replaying">
    @if (hasGroups()) {
      @if (showGroups()) {
        <button matButton title="Hide groups" (click)="toggleGroups.emit()">
          <span class="material-icons-outlined buttonIcon">
            visibility_off
          </span>
          Groups
        </button>
      } @else {
        <button matButton title="Show groups" (click)="toggleGroups.emit()">
          <span class="material-icons-outlined buttonIcon"> visibility </span>
          Groups
        </button>
      }
    }
    <button
      matButton
      title="Previous sentence"
      (click)="previousSentence.emit()"
    >
      <span class="material-icons-outlined buttonIcon"> skip_previous </span>
      Prev.
    </button>
    <button matButton title="Next sentence" (click)="nextSentence.emit()">
      <span class="material-icons-outlined buttonIcon"> skip_next </span>
      Next
    </button>
    <button matButton title="Stop replay" (click)="stopReplay.emit()">
      <span class="material-icons-outlined buttonIcon"> stop </span>
      Stop
    </button>
    <div class="sentences">Sentence: {{ sentenceDescription() }}</div>
  </div>
}
