@if (!isReplaying()) {
  <div>
    <button
      type="button"
      [disabled]="!isReplayable()"
      [class.disabled]="!isReplayable()"
      id="buttonStartReplay"
      class="headerButton"
      title="Start replay"
      (click)="startReplay.emit()"
    >
      <span class="material-icons-outlined materialIconButton">
        play_arrow
      </span>
      Replay
    </button>

    <button
      type="button"
      id="buttonImport"
      class="headerButton"
      title="Import story from file"
      onclick="document.getElementById('import').click()"
    >
      <span class="material-icons-outlined materialIconButton">
        file_upload
      </span>
      Import file
    </button>

    <button
      type="button"
      id="buttonUrlImport"
      class="headerButton"
      title="Import story from URL"
      (click)="openImportFromUrlDialog.emit()"
    >
      <span class="material-icons-outlined materialIconButton">
        cloud_upload
      </span>
      Import URL
    </button>

    <input
      type="file"
      accept=".dst, .egn, .svg"
      style="display: none"
      id="import"
      onclick="this.value = null"
      (change)="import.emit()"
    />
    <button
      type="button"
      [disabled]="!hasDomainStory() && !hasTitle()"
      [class.disabled]="!hasDomainStory() && !hasTitle()"
      class="headerButton"
      [class.dirty]="isDirty()"
      id="export"
      title="Export story as .egn, .svg or .png file"
      (click)="openDownloadDialog.emit()"
    >
      <span class="material-icons-outlined materialIconButton">
        file_download
      </span>
      Export
    </button>
    <button
      type="button"
      [disabled]="!hasDomainStory()"
      [class.disabled]="!hasDomainStory()"
      class="headerButton"
      title="Change multiple labels at once"
      (click)="openLabelDictionary.emit()"
    >
      <span class="material-icons-outlined materialIconButton">
        spellcheck
      </span>
      Dictionary
    </button>

    <button
      type="button"
      class="headerButton"
      title="Create a new domain story"
      (click)="newStory.emit()"
    >
      <span class="material-icons-outlined materialIconButton"> note_add </span>
      New story
    </button>

    <button
      type="button"
      class="headerButton"
      title="Change Icons and Settings"
      (click)="openSettings.emit()"
    >
      <span class="material-icons-outlined materialIconButton"> settings </span>
      Settings
    </button>

    <button
      type="button"
      class="headerButton"
      title="Show keyboard shortcuts"
      (click)="showKeyboardShortCuts.emit()"
    >
      <span class="material-icons-outlined materialIconButton"> keyboard </span>
      Shortcuts
    </button>
  </div>
} @else {
  <div class="replaying">
    @if (hasGroups()) {
      @if (showGroups()) {
        <button
          type="button"
          class="headerButton"
          title="Hide groups"
          (click)="toggleGroups.emit()"
        >
          <span class="material-icons-outlined materialIconButton">
            visibility_off
          </span>
          Groups
        </button>
      } @else {
        <button
          type="button"
          class="headerButton"
          title="Show groups"
          (click)="toggleGroups.emit()"
        >
          <span class="material-icons-outlined materialIconButton">
            visibility
          </span>
          Groups
        </button>
      }
    }
    <button
      type="button"
      class="headerButton"
      title="Previous sentence"
      (click)="previousSentence.emit()"
    >
      <span class="material-icons-outlined materialIconButton">
        skip_previous
      </span>
      Prev.
    </button>
    <button
      type="button"
      class="headerButton"
      title="Next sentence"
      (click)="nextSentence.emit()"
    >
      <span class="material-icons-outlined materialIconButton">
        skip_next
      </span>
      Next
    </button>
    <button
      type="button"
      class="headerButton"
      title="Stop replay"
      (click)="stopReplay.emit()"
    >
      <span class="material-icons-outlined materialIconButton"> stop </span>
      Stop
    </button>
    <div class="sentences">Sentence: {{ sentenceDescription() }}</div>
  </div>
}
