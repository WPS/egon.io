<mat-expansion-panel>
  <mat-expansion-panel-header>
    <mat-panel-title>
      {{ this.propertiesService.title() }}
    </mat-panel-title>
    <mat-panel-description>
      <app-header-buttons
        class="nowrap"
        [hasDomainStory]="hasDomainStory"
        [hasTitle]="hasTitle"
        [isDirty]="isDirty()"
        [isReplayable]="isReplayable"
        [isReplaying]="isReplayOn()"
        [showGroups]="showGroups()"
        [hasGroups]="hasGroups()"
        (import)="onImport()"
        (openSettings)="openSettings()"
        (startReplay)="startReplay()"
        (stopReplay)="stopReplay()"
        (nextSentence)="nextSentence()"
        (previousSentence)="previousSentence()"
        (toggleGroups)="toggleGroups()"
        (newStory)="createNewDomainStory()"
        (showKeyboardShortCuts)="openKeyboardShortcutsDialog()"
        (openLabelDictionary)="openLabelDictionary()"
        (openDownloadDialog)="openDownloadDialog()"
        (openImportFromUrlDialog)="openImportFromUrlDialog()"
        (click)="$event.stopPropagation()"
      />
      <!-- IMPORTANT: the (click)="$event.stopPropagation();" is needed to prevent the expansion panel from opening and closing when clicking on the buttons -->
    </mat-panel-description>
  </mat-expansion-panel-header>
  <app-properties-dialog />
</mat-expansion-panel>
